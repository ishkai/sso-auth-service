services:
  postgres:
    image: postgres:16-alpine
    container_name: sso-postgres
    environment:
      POSTGRES_DB: sso
      POSTGRES_USER: sso
      POSTGRES_PASSWORD: sso
    ports:
      - "5433:5432"
    volumes:
      - sso_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso -d sso"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    build:
      context: .
    container_name: sso-migrator
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "migator",
        "--database-url",
        "postgres://sso:sso@postgres:5432/sso?sslmode=disable",
        "--migrations-path",
        "/app/migrations/postgres"
      ]
    restart: "no"

  auth-service:
    build:
      context: .
    container_name: sso-auth-service
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "44044:44044"
      - "8081:8080"
    command: ["sso", "--config=/app/config/docker.yaml"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: sso-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - auth-service

volumes:
  sso_pg_data: